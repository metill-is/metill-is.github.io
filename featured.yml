- title: "Handboltaspá Metils fyrir EM í handbolta 2026"
  description: |
    Hverjar eru líkurnar á að Ísland vinnni næsta leik? Hvaða lið munu mætast í undanúrslitum? Hefur íslenska landsliðið bætt sig í sóknar- og varnarstyrk síðasta áratuginn?
    
    Handboltalíkan Metils býður upp á greiningu á frammistöðu landsliða sem keppa á EM í handbolta, en hún byggir á útvíkkun svonefnds Bradley-Terry líkans. Þetta líkan metur líkur á sigri milli liða út frá úrslitum keppna þeirra og gerir okkur kleift að bera saman getu ólíkra liða.

    
